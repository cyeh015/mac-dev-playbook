---
configure_dotfiles: true
configure_terminal: false
configure_osx: true

# Set to 'true' to configure the Dock via dockutil.
configure_dock: false
dockitems_remove: []
# - Launchpad
# - TV
# - Podcasts
# - 'App Store'
dockitems_persist: []
# - name: "Sublime Text"
#   path: "/Applications/Sublime Text.app/"
#   pos: 5

configure_sudoers: false
sudoers_custom_config: ""
# Example:
# sudoers_custom_config: |
#   # Allow users in admin group to use sudo with no password.
#   %admin ALL=(ALL) NOPASSWD: ALL

dotfiles_repo: https://github.com/cyeh015/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/work/dotfiles
dotfiles_repo_version: main # Replace with your default branch
dotfiles_files:
  - .zshrc
  - .zprofile
  - .gitignore
  # - .inputrc
  - .osx
  - .vimrc
  - .screenrc

homebrew_installed_packages:
  # - ansible # Installed via Pip.
  # - autoconf
  # - bash-completion
  # - doxygen
  # - gettext
  # - gifsicle
  # - git
  # - gh
  # - go
  # - gpg
  # - httpie
  # - iperf
  # - libevent
  # - sqlite
  # - nmap
  # - node
  # - nvm
  # - php
  # - pngpaste
  # - ssh-copy-id
  # - readline
  # - openssl
  # - pv
  # - wget
  # - wrk
  # - zsh-history-substring-search
  # ---
  - iperf3
  # required to build PETSc
  - make
  - autoconf
  - automake
  - libtool
  # Mac App Store command-line interface
  - mas

homebrew_taps: []

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  # - chromedriver
  # - docker
  - dropbox
  # - firefox
  - google-chrome
  # - handbrake
  # - licecap
  # - sequel-ace
  # - slack
  - sublime-text
  # - transmit

# See `geerlingguy.mac.mas` role documentation for usage instructions.
# use (a homebrew package) `mas list` to show currently installed App Store apps
mas_installed_apps:
  - { id: 1295203466, name: "Windows App (11.3.5)" }
  - { id: 1475387142, name: "Tailscale (1.96.5)" }
  - { id:  822514576, name: "SonicWall Mobile Connect (5.0.14)" }
  - { id:  409907375, name: "Remote Desktop (3.10)" }
  - { id:  425264550, name: "Blackmagic Disk Speed Test (3.4.2)" }
  - { id:  497799835, name: "Xcode (26.2)" }
  - { id:  462058435, name: "Microsoft Excel (16.107.4)" }
  - { id:  462062816, name: "Microsoft PowerPoint (16.107.4)" }
  - { id:  462054704, name: "Microsoft Word (16.107.4)" }
  - { id:  424389933, name: "Final Cut Pro (12.2)" }
  # - { id: 1437809329, name: "Surfshark (4.27.0)" }

mas_email: ""
mas_password: ""

osx_script: "~/.osx --no-restart"

# Install packages from other package managers.
# Note: You are responsible for making sure the required package managers are
# installed, eg. through homebrew.
composer_packages: []
# - name: drush
#   state: present # present/absent, default: present
#   version: "^8.1" # default: N/A
gem_packages: []
# - name: bundler
#   state: present # present/absent/latest, default: present
#   version: "~> 1.15.1" # default: N/A
npm_packages: []
# - name: webpack
#   state: present # present/absent/latest, default: present
#   version: "^2.6" # default: N/A
pip_packages: []
# - name: mkdocs
#   state: present # present/absent/latest, default: present
#   version: "0.16.3" # default: N/A

# Set to 'true' to configure Sublime Text.
configure_sublime: false
sublime_base_path: "~/Library/Application Support/Sublime Text"
sublime_config_path: "Packages/User"
sublime_package_control:
  - "DocBlockr"
  - "Dockerfile Syntax Highlighting"
  - "FileDiffs"
  - "GitHub Flavored Markdown Preview"
  - "Jinja2"
  - "Package Control"
  - "Pretty JSON"
  - "SublimeLinter"
  - "SublimeLinter-contrib-yamllint"
  - "Theme - Cobalt2"
  - "TrailingSpaces"
  - "WordingStatus"

# Glob pattern to ansible task files to run after all other tasks are finished.
post_provision_tasks: []
